name: Proponer una fuente
description: Sugiere una nueva fuente, norma, conjunto de datos o herramienta.
title: "[nueva fuente] "
labels: ["propuesta"]
body:
  - type: input
    id: nombre
    attributes:
      label: Nombre
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      placeholder: https://...
    validations:
      required: true
  - type: dropdown
    id: tipo
    attributes:
      label: Tipo
      options:
        - Fuente oficial
        - Norma o jurisprudencia
        - Datos abiertos
        - Proyecto de codigo abierto
        - Recurso academico o comunitario
    validations:
      required: true
  - type: textarea
    id: justificacion
    attributes:
      label: Relacion con Colombia y utilidad
    validations:
      required: true
  - type: textarea
    id: limites
    attributes:
      label: Limitaciones conocidas
      description: Cobertura, vigencia, licencia o restricciones relevantes.
